site_name: aio-mrr Documentation
site_description: Async library for MiningRigRentals API v2 by GRinvest
site_author: GRinvest / SibNeuroTech
repo_name: GRinvest/aio-mrr
repo_url: https://github.com/GRinvest/aio-mrr

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - ru
        - zh
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ru
          name: Русский
          build: true
        - locale: zh
          name: 中文
          build: true

nav:
  - Home: index.md
  - Getting Started:
    - Setup & Authentication: authentication.md
    - Error Handling: error-handling.md
    - Data Models: models.md
  - API Reference:
    - Account & Profiles: api-reference/account.md
    - Rigs: api-reference/rigs.md
    - Rentals: api-reference/rentals.md
    - Rig Groups: api-reference/rig-groups.md
    - Info: api-reference/info.md
    - Pricing: api-reference/pricing.md
  - Examples:
    - Quick Start: https://github.com/GRinvest/aio-mrr/blob/main/examples/01_quickstart.py
    - All Examples: https://github.com/GRinvest/aio-mrr/tree/main/examples/
